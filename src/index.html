<!doctype html>

      name="description"
      content="Senior Software Engineer with over a decade of experience in Full-Stack Development, Cloud Architecture, AI, and DevOps."
    />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        try {
          var s = localStorage.getItem('theme');
          var t =
            s === 'light' || s === 'dark'
              ? s
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {}
      })();
    </script>
    <meta name="theme-color" content="#07070b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0f0f3" media="(prefers-color-scheme: light)" />

    <!--
      Preconnect to our own origin so NgOptimizedImage's `priority` flag on
      the sidebar avatar (and any future LCP image) silences NG02956. The
      hint is a no-op for same-origin requests but keeps Angular happy and
      future-proofs against moving image hosting onto a CDN.
    -->
    <link rel="preconnect" href="https://faisalkhan.dpdns.org" crossorigin />

    <!-- Fonts: preconnect + stylesheet (not CSS @import, avoids render-blocking chain) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
