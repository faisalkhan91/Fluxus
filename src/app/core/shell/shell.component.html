<a href="#main-content" class="skip-link">Skip to content</a>
<a href="#main-navigation" class="skip-link skip-link--nav">Skip to navigation</a>

<!--
  Chrome elements render unconditionally so the prerendered HTML is identical
  for every viewport. CSS @media queries in shell/sidebar/tab-bar/mobile-pill
  decide which one is visible, eliminating the hydration layout shift caused
  by the SSR media-query default.

  The `<header>` wrapper exposes the site banner landmark — `<header>` at
  the document root is implicitly `role="banner"`, but we set the role
  explicitly so SR engines that downgrade implicit roles (older Safari +
  VoiceOver combinations) still report it. The contained `<ui-sidebar>`
  keeps its own `role="navigation"` — these are independent landmarks
  ("Site banner" → "Main Navigation"), and ARIA permits navigation to
  nest inside banner.
-->
<header role="banner" class="site-banner" aria-label="Site banner">
  <ui-sidebar
    id="main-navigation"
    [items]="navService.sidebarItems"
    [collapsed]="media.sidebarCollapsed()"
    [isDark]="themeService.isDark()"
    (resumeClicked)="onResumeDownload()"
    (themeToggled)="onThemeToggle()"
  />
</header>

<div class="main-area">
  <ui-editor-tab-bar
    [tabs]="tabService.openTabs()"
    [activeTabId]="tabService.activeTabId()"
    (tabSelected)="tabService.selectTab($event)"
    (tabClosed)="tabService.closeTab($event)"
    (closeAllRequested)="tabService.closeAllTabs()"
  />

  <main id="main-content" tabindex="-1" class="content">
    <router-outlet />
  </main>
</div>

<button
  class="mobile-theme-toggle"
  (click)="onThemeToggle()"
  [attr.aria-label]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
>
  <ui-icon [name]="themeService.isDark() ? 'sun' : 'moon'" [size]="18" />
</button>

<ui-mobile-nav-pill [items]="navService.mobileNavItems" [menuItems]="navService.mobileMenuItems" />

<ui-toast-region />
<ui-command-palette />
