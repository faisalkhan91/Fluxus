@if (open()) {
  <div
    class="backdrop"
    (click)="onBackdropClick()"
    (keydown.enter)="onBackdropClick()"
    tabindex="-1"
    aria-hidden="true"
  ></div>
  <div
    class="sheet"
    [style.transform]="'translateY(' + dragOffset() + 'px)'"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title()"
    tabindex="-1"
  >
    <div class="drag-handle" (touchstart)="onDragStart($event)">
      <span class="handle-bar"></span>
    </div>
    @if (title()) {
      <div class="sheet-header">
        <h3 class="sheet-title">{{ title() }}</h3>
        <button class="close-btn" (click)="closed.emit()" aria-label="Close">
          <ui-icon name="x" [size]="18" />
        </button>
      </div>
    }
    <div class="sheet-content">
      <ng-content />
    </div>
  </div>
}
