<div class="sidebar-header">
  <a routerLink="/" class="sidebar-home-link" aria-label="Go to Welcome page" title="Welcome">
    <div class="avatar-wrapper">
      <img
        ngSrc="assets/images/profile/profile_picture.jpg"
        width="80"
        height="80"
        alt="Faisal Khan"
        priority
        class="avatar"
      />
    </div>
    <div class="identity">
      <h2 class="name">Faisal Khan</h2>
      <p class="role">Software Engineer</p>
    </div>
  </a>
</div>

<ul class="nav-list">
  @for (item of items(); track item.label) {
    @if (item.type === 'divider') {
      @if (item.label) {
        <li class="nav-divider" aria-hidden="true">
          <span class="divider-label">{{ item.label }}</span>
        </li>
      } @else {
        <li class="nav-divider nav-divider--line" aria-hidden="true"></li>
      }
    } @else {
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-item"
          [attr.aria-label]="collapsed() ? item.label : null"
        >
          <ui-icon [name]="item.icon" [size]="18" />
          <span class="nav-label">{{ item.label }}</span>
          <span class="nav-ext">{{ item.ext }}</span>
        </a>
      </li>
    }
  }
</ul>

<div class="sidebar-footer">
  <!--
    Compound theme control:
      - Main button toggles between the user's last-dark and last-light
        pick (sun icon when on a dark theme = "next is light").
      - Trailing chevron opens the command palette pre-filtered to
        `theme:` so the user can pick any theme by name.
      - Shift / Alt + click on the main button is a keyboard-friendly
        alias for the chevron.

    aria-keyshortcuts advertises the modifier alias to AT users so the
    discoverability of the picker doesn't depend on noticing the chevron.
  -->
  <div class="theme-toggle-group">
    <button
      class="theme-toggle"
      (click)="onThemeButtonClick($event)"
      [attr.aria-label]="
        'Theme: ' +
        currentTheme().label +
        '. Activate to switch to ' +
        (isDark() ? 'last light theme' : 'last dark theme') +
        '. Shift+click to open the theme picker.'
      "
      aria-keyshortcuts="Shift"
    >
      <ui-icon [name]="isDark() ? 'sun' : 'moon'" [size]="16" />
      <span class="theme-toggle-label">{{ currentTheme().label }}</span>
    </button>
    <button
      class="theme-picker-btn"
      (click)="themePickerRequested.emit()"
      aria-label="Open theme picker"
      title="Open theme picker"
    >
      <ui-icon name="chevron-down" [size]="14" />
    </button>
  </div>
  <button class="resume-btn" (click)="resumeClicked.emit()" aria-label="Download Resume">
    <ui-icon name="download" [size]="16" />
    <span>Download Resume</span>
  </button>
</div>
