<div class="timeline">
  @for (item of items(); track $index) {
    @if (item.type === 'period') {
      <div class="timeline-period">
        <span class="period-label">{{ item.title }}</span>
      </div>
    } @else {
      <div class="timeline-entry">
        <div class="timeline-rail">
          <div class="timeline-dot"></div>
          <div class="timeline-line"></div>
        </div>
        <ui-glass-card class="timeline-card" [hover]="true">
          @if (item.duration) {
            <span class="entry-duration">{{ item.duration }}</span>
          }
          <h4 class="entry-title">{{ item.subtitle }}</h4>
          @for (detail of item.details ?? []; track $index) {
            <p class="entry-paragraph">{{ detail }}</p>
          }
        </ui-glass-card>
      </div>
    }
  }
</div>
