<div class="pill">
  @for (item of items(); track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.route === '/' }"
      class="pill-item"
      [attr.aria-label]="item.label"
    >
      <ui-icon [name]="item.icon" [size]="20" />
      <span class="pill-label">{{ item.label }}</span>
    </a>
  }

  <button
    #menuTrigger
    type="button"
    class="pill-item"
    [class.active]="menuOpen()"
    (click)="openMenu()"
    aria-label="Menu"
    [attr.aria-expanded]="menuOpen()"
    aria-haspopup="dialog"
  >
    <ui-icon name="menu" [size]="20" />
    <span class="pill-label">Menu</span>
  </button>
</div>

@if (menuOpen()) {
  <div class="menu-overlay" (click)="closeMenu()" aria-hidden="true"></div>
  <div
    #menuPanel
    class="menu-panel"
    role="dialog"
    aria-modal="true"
    aria-label="Navigation menu"
    tabindex="-1"
    (keydown.escape)="closeMenu()"
    (keydown)="trapFocus($event)"
  >
    <div class="menu-header">
      <span class="menu-title">Navigate</span>
      <button class="menu-close" (click)="closeMenu()" aria-label="Close menu">
        <ui-icon name="x" [size]="20" />
      </button>
    </div>
    <ul class="menu-list">
      @for (item of menuItems(); track $index) {
        @if (item.type === 'divider') {
          <li class="menu-divider" aria-hidden="true">
            <span class="menu-divider-line"></span>
            @if (item.label) {
              <span class="menu-divider-label">{{ item.label }}</span>
            }
          </li>
        } @else {
          <li>
            <button
              class="menu-link"
              [class.menu-link--active]="isActive(item.route)"
              (click)="navigateTo(item.route)"
            >
              <ui-icon [name]="item.icon" [size]="20" />
              <span>{{ item.label }}</span>
              @if (isActive(item.route)) {
                <ui-icon name="chevron-right" [size]="14" class="menu-link-indicator" />
              }
            </button>
          </li>
        }
      }
    </ul>
  </div>
}
