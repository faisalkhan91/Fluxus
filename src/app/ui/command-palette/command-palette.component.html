<!--
  The dialog itself stays free of click handlers so the lint rules don't
  insist on keyboard mirrors — the palette is fully keyboard-accessible
  (cmd+k toggles, Esc closes via the dialog's built-in `close` event).
  Backdrop dismiss is handled by the explicit overlay <div> inside.

  `aria-modal="true"` is set explicitly even though modern Chromium / Safari /
  Firefox apply it implicitly when `showModal()` is called. Older Safari
  builds (< 16) don't, and the cost of the extra attribute is zero on the
  modern path. Matches WAI-ARIA dialog pattern.
-->
<dialog
  #dialog
  class="palette"
  role="dialog"
  aria-modal="true"
  aria-label="Command palette"
  (close)="open.set(false)"
>
  <div class="palette-frame">
    <!--
      Combobox + listbox pattern (WAI-ARIA APG, "Editable Combobox With
      List Autocomplete"). The input keeps real keyboard focus while
      `aria-activedescendant` points at whichever option the arrow keys
      have currently highlighted, so screen readers announce the active
      option without focus actually moving away from the search box.
    -->
    <div class="palette-input-row">
      <ui-icon name="send" [size]="16" />
      <input
        #input
        type="text"
        class="palette-input"
        placeholder="Search pages and posts..."
        role="combobox"
        aria-controls="palette-listbox"
        aria-autocomplete="list"
        aria-expanded="true"
        [attr.aria-activedescendant]="activeDescendantId()"
        [value]="query()"
        (input)="onInput($any($event.target).value)"
        (keydown)="onKey($event)"
        autocomplete="off"
        spellcheck="false"
      />
      <kbd class="palette-kbd">Esc</kbd>
    </div>

    @if (filtered().length === 0) {
      <p class="palette-empty" id="palette-listbox" role="status">No matches.</p>
    } @else {
      <!--
        Each option is a plain <li role="option">, not a <button>, because
        ARIA rejects `option` on a natively-interactive element (role
        conflict). Keyboard activation lives on the input via
        `aria-activedescendant` + the onKey() handler — focus never moves
        into the list. The (click) / (mouseenter) here serve pointer users
        only; they don't need button semantics.
      -->
      <ul class="palette-list" id="palette-listbox" role="listbox">
        @for (item of filtered(); track item.id; let i = $index) {
          <li
            class="palette-item"
            [class.palette-item--active]="i === highlighted()"
            role="option"
            [id]="item.domId"
            [attr.aria-selected]="i === highlighted()"
            (mouseenter)="highlighted.set(i)"
            (click)="select(item)"
          >
            @if (item.swatch) {
              <span
                class="palette-swatch"
                [style.background-color]="item.swatch"
                aria-hidden="true"
              ></span>
            }
            <ui-icon [name]="item.icon" [size]="14" />
            <span class="palette-label">{{ item.label }}</span>
            <span class="palette-hint">{{ item.hint }}</span>
          </li>
        }
      </ul>
    }

    <!--
      Two footer variants: the keyboard hint row for desktop (↵ open ·
      ↑↓ navigate · ⌘K toggle) and a tap-friendly hint for touch
      devices. CSS swaps which one paints based on `(hover: hover)` —
      glyphs like `⌘K` and `↑↓` are noise on a phone where none of
      them apply, and were a small but real "what do I do here?"
      moment for mobile users on every palette open.
    -->
    <p class="palette-footer palette-footer--keyboard">
      <kbd>↵</kbd> open · <kbd>↑</kbd> <kbd>↓</kbd> navigate · <kbd>⌘K</kbd> toggle
    </p>
    <p class="palette-footer palette-footer--touch">Tap a result to open · tap outside to close</p>
  </div>
</dialog>
