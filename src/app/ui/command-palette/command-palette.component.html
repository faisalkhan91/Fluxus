<!--
  The dialog itself stays free of click handlers so the lint rules don't
  insist on keyboard mirrors — the palette is fully keyboard-accessible
  (cmd+k toggles, Esc closes via the dialog's built-in `close` event).
  Backdrop dismiss is handled by the explicit overlay <div> inside.
-->
<dialog
  #dialog
  class="palette"
  aria-label="Command palette"
  (close)="open.set(false)"
>
  <div class="palette-frame">
    <div class="palette-input-row">
      <ui-icon name="send" [size]="16" />
      <input
        #input
        type="text"
        class="palette-input"
        placeholder="Search pages and posts..."
        [value]="query()"
        (input)="onInput($any($event.target).value)"
        (keydown)="onKey($event)"
        autocomplete="off"
        spellcheck="false"
      />
      <kbd class="palette-kbd">Esc</kbd>
    </div>

    @if (filtered().length === 0) {
      <p class="palette-empty">No matches.</p>
    } @else {
      <ul class="palette-list" role="listbox">
        @for (item of filtered(); track item.id; let i = $index) {
          <li>
            <button
              type="button"
              class="palette-item"
              [class.palette-item--active]="i === highlighted()"
              role="option"
              [attr.aria-selected]="i === highlighted()"
              (mouseenter)="highlighted.set(i)"
              (click)="select(item)"
            >
              <ui-icon [name]="item.icon" [size]="14" />
              <span class="palette-label">{{ item.label }}</span>
              <span class="palette-hint">{{ item.hint }}</span>
            </button>
          </li>
        }
      </ul>
    }

    <p class="palette-footer">
      <kbd>↵</kbd> open · <kbd>↑</kbd> <kbd>↓</kbd> navigate · <kbd>⌘K</kbd> toggle
    </p>
  </div>
</dialog>
