@for (toast of toasts.toasts(); track toast.id; let i = $index) {
  <!--
    Announcement is owned by the persistent host live region (role="region"
    aria-live="polite"), which exists before any toast mounts so SRs reliably
    announce inserted toasts. Non-error toasts therefore carry NO own live
    role (a redundant nested polite region would risk double-announcement).
    `'error'` toasts opt up to assertive via role="alert" on the node, which
    interrupts the queue and is announced reliably on insertion. Default
    severity is `'info'`, so a confirmation like "Section link copied" is
    polite and won't talk over the user.
  -->
  <div
    class="toast"
    [attr.role]="toast.severity === 'error' ? 'alert' : null"
    [style.--toast-index]="i"
    animate.leave="toast-out"
  >
    <div class="toast-body">
      <p class="toast-title">{{ toast.title }}</p>
      @if (toast.detail) {
        <p class="toast-detail">{{ toast.detail }}</p>
      }
    </div>
    <div class="toast-actions">
      @if (toast.actionLabel && toast.action) {
        <button
          type="button"
          class="toast-action"
          (click)="toast.action(); toasts.dismiss(toast.id)"
        >
          {{ toast.actionLabel }}
        </button>
      }
      <button
        type="button"
        class="toast-dismiss"
        (click)="toasts.dismiss(toast.id)"
        aria-label="Dismiss notification"
      >
        &times;
      </button>
    </div>
  </div>
}
