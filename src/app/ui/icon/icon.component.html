<svg
  [attr.width]="size()"
  [attr.height]="size()"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
  aria-hidden="true"
  focusable="false"
>
  @for (shape of shapes(); track $index) {
    @switch (shape.tag) {
      @case ('path') {
        <path [attr.d]="shape.d" />
      }
      @case ('line') {
        <line [attr.x1]="shape.x1" [attr.y1]="shape.y1" [attr.x2]="shape.x2" [attr.y2]="shape.y2" />
      }
      @case ('polyline') {
        <polyline [attr.points]="shape.points" />
      }
      @case ('polygon') {
        <polygon [attr.points]="shape.points" />
      }
      @case ('circle') {
        <circle [attr.cx]="shape.cx" [attr.cy]="shape.cy" [attr.r]="shape.r" />
      }
      @case ('rect') {
        <rect
          [attr.x]="shape.x ?? null"
          [attr.y]="shape.y ?? null"
          [attr.width]="shape.width"
          [attr.height]="shape.height"
          [attr.rx]="shape.rx ?? null"
          [attr.ry]="shape.ry ?? null"
        />
      }
    }
  }
</svg>
