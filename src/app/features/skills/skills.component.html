<div class="skills-layout">
  <ui-section-header
    title="Skills"
    headingId="skills-title"
    decoration="// stack.json"
    [level]="1"
  />
  @for (category of skillsData.categories(); track category.title) {
    <section class="skill-section" [attr.aria-labelledby]="'skill-' + slugify(category.title)">
      <ui-section-header
        [title]="category.title"
        [headingId]="'skill-' + slugify(category.title)"
        [decoration]="'// ' + slugify(category.title) + '.json'"
      />

      <div class="badge-grid" [id]="'skill-grid-' + slugify(category.title)">
        @for (skill of visibleSkills(category); track skill.name) {
          <ui-skill-badge [name]="skill.name" [iconSrc]="skill.iconSrc" />
        }
      </div>

      @if (hiddenCount(category) > 0) {
        <button
          class="expand-toggle"
          (click)="toggleCategory(category.title)"
          [attr.aria-expanded]="isExpanded(category.title)"
          [attr.aria-controls]="'skill-grid-' + slugify(category.title)"
        >
          @if (isExpanded(category.title)) {
            Show less
          } @else {
            + {{ hiddenCount(category) }} more
          }
        </button>
      }
    </section>
  }
</div>
