<div class="projects-layout">
  <ui-section-header title="Projects" decoration="// git log --oneline" />
  <div class="projects-grid">
    @for (project of projectsData.projects(); track project.title) {
      <ui-glass-card [hover]="true" [glow]="!!project.featured" class="project-card" [class.expanded]="isExpanded(project.title)">
        <div class="project-image-wrapper">
          <img [ngSrc]="project.image" [alt]="project.title" width="400" height="256" class="project-image" />
        </div>
        <div class="project-body">
          <h3 class="project-title">{{ project.title }}</h3>
          <p class="project-desc" [id]="'desc-' + project.title">{{ project.description }}</p>
          <button
            type="button"
            class="read-more-toggle"
            [attr.aria-expanded]="isExpanded(project.title)"
            [attr.aria-controls]="'desc-' + project.title"
            [attr.aria-label]="isExpanded(project.title) ? 'Show less about ' + project.title : 'Read more about ' + project.title"
            (click)="toggleExpand(project.title)"
          >
            {{ isExpanded(project.title) ? '− Show less' : '+ Read more' }}
          </button>
          <div class="project-footer">
            <div class="project-tags">
              @for (tag of project.tags; track tag) {
                <span class="tag">{{ tag }}</span>
              }
            </div>
            <a [href]="project.link" target="_blank" rel="noopener" class="project-link" [attr.aria-label]="'View ' + project.title + ' on GitHub'">
              <ui-icon name="github" [size]="16" />
              <span>Source</span>
              <ui-icon name="external-link" [size]="12" />
            </a>
          </div>
        </div>
      </ui-glass-card>
    }
  </div>
</div>
