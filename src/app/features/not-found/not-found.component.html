<div class="not-found">
  <div class="terminal-window">
    <div class="terminal-bar">
      <span class="terminal-dot red"></span>
      <span class="terminal-dot yellow"></span>
      <span class="terminal-dot green"></span>
      <span class="terminal-title">zsh — error</span>
    </div>
    <div class="terminal-body">
      <p class="line"><span class="prompt">$</span> curl -I /{{ path }}</p>
      <p class="line output">HTTP/1.1 <span class="error-code">404</span> Not Found</p>
      <p class="line output">content-type: text/html</p>
      <p class="line"><span class="prompt">$</span> echo "The page you're looking for doesn't exist."</p>
      <p class="line output">The page you're looking for doesn't exist.</p>
      <p class="line"><span class="prompt">$</span> <span class="cursor-blink">_</span></p>
    </div>
  </div>

  <div class="actions">
    <a routerLink="/hero">
      <ui-glow-button variant="primary">
        <ui-icon name="arrow-left" [size]="16" />
        Back to Home
      </ui-glow-button>
    </a>
  </div>
</div>
