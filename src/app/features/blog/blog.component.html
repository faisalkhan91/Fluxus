<div class="blog-layout">
  <ui-section-header
    title="Blog"
    subtitle="Thoughts on engineering, cloud, and craft"
    decoration="// posts.rss"
    [level]="1"
  />

  @if (blog.posts().length) {
    <div class="post-grid">
      @for (post of blog.posts(); track post.slug) {
        <a [routerLink]="['/blog', post.slug]" class="post-link">
          <ui-glass-card [elevation]="1" [hover]="true" [glow]="true" class="post-card">
            <div class="post-meta">
              <time class="post-date" [attr.datetime]="post.date">
                <ui-icon name="calendar" [size]="12" />
                {{ post.date }}
              </time>
              <span class="post-reading-time">
                <ui-icon name="clock" [size]="12" />
                {{ post.readingTime }}
              </span>
            </div>
            <h2 class="post-title">{{ post.title }}</h2>
            <p class="post-excerpt">{{ post.excerpt }}</p>
            <div class="post-tags">
              @for (tag of post.tags; track tag) {
                <span class="tag">{{ tag }}</span>
              }
            </div>
          </ui-glass-card>
        </a>
      }
    </div>
  }
</div>
