<div class="tag-layout" animate.enter="enter-fade-up">
  <nav aria-label="Breadcrumb" class="tag-breadcrumb">
    <ol>
      <li><a routerLink="/">Home</a></li>
      <li><a routerLink="/blog">Blog</a></li>
      <li aria-current="page">{{ tagLabel() }}</li>
    </ol>
  </nav>

  <ui-section-header
    [title]="'Posts tagged ' + tagLabel()"
    decoration="// filtered.rss"
    [level]="1"
  />

  @if (blog.loading()) {
    <div class="tag-status" role="status" aria-live="polite">
      <span class="loading-cursor">Loading posts...</span>
    </div>
  } @else if (matchingPosts().length === 0) {
    <div class="tag-status">
      <p>
        No posts found for <strong>{{ tagLabel() }}</strong
        >. <a routerLink="/blog">Browse all posts</a>.
      </p>
    </div>
  } @else {
    <div class="post-grid">
      @for (post of matchingPosts(); track post.slug; let i = $index) {
        <!--
          Tag-archive cards mirror the blog index's non-featured cards (no
          hero/featured variant here). `md` tag pills + the unclamped body
          (the archive sizes cards to content) are the only divergences from
          the index, both expressed as inputs. 50ms-per-card entrance wave.
        -->
        <app-post-card [post]="post" tagSize="md" [index]="i" [enterDelayStep]="50" />
      }
    </div>
    <p class="tag-grid-footer">
      <a routerLink="/blog" class="tag-back-link">
        <ui-icon name="arrow-left" [size]="14" />
        <span>View all posts</span>
      </a>
    </p>
  }
</div>
