<div class="post-layout">
  <div class="reading-progress" [style.width.%]="scrollProgress()"></div>

  <nav class="post-nav">
    <a routerLink="/blog" class="back-link">
      <ui-icon name="arrow-left" [size]="16" />
      <span>All Posts</span>
    </a>
  </nav>

  @if (meta(); as post) {
    <header class="post-header">
      <div class="post-meta">
        <time class="post-date">
          <ui-icon name="calendar" [size]="14" />
          {{ post.date }}
        </time>
        <span class="post-reading-time">
          <ui-icon name="clock" [size]="14" />
          {{ post.readingTime }}
        </span>
      </div>
      <div class="post-tags">
        @for (tag of post.tags; track tag) {
          <span class="tag">{{ tag }}</span>
        }
      </div>
    </header>
  }

  <ui-glass-panel class="post-content">
    @if (loading()) {
      <div class="post-loading">
        <span class="loading-cursor">Loading post...</span>
      </div>
    } @else {
      <article class="prose" [innerHTML]="content()"></article>
    }
  </ui-glass-panel>

  @if (adjacentPosts(); as nav) {
    <nav class="post-footer-nav" aria-label="Post navigation">
      @if (nav.prev) {
        <a [routerLink]="['/blog', nav.prev.slug]" class="footer-nav-link footer-nav-prev">
          <span class="footer-nav-direction">
            <ui-icon name="arrow-left" [size]="14" />
            Previous
          </span>
          <span class="footer-nav-title">{{ nav.prev.title }}</span>
        </a>
      }
      @if (nav.next) {
        <a [routerLink]="['/blog', nav.next.slug]" class="footer-nav-link footer-nav-next">
          <span class="footer-nav-direction">
            Next
            <ui-icon name="arrow-right" [size]="14" />
          </span>
          <span class="footer-nav-title">{{ nav.next.title }}</span>
        </a>
      }
    </nav>
  }
</div>
