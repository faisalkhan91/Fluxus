<section class="projects" id="projects" aria-labelledby="portfolio-title">
    <h2 id="portfolio-title" class="sr-only">Portfolio Projects</h2>
    <div class="projects-grid">
        @for (project of projects(); track project.title) {
            <article class="project-card">
                <div class="image-wrapper">
                    <img [ngSrc]="project.image" [alt]="project.title" width="200" height="128" class="project-pic" />
                </div>
                <div class="project-content">
                    <h3 class="project-title">{{ project.title }}</h3>
                    <p class="project-description">{{ project.description }}</p>
                    <div class="project-footer">
                        <a [href]="project.link" target="_blank" rel="noopener" class="project-link" [attr.aria-label]="'View ' + project.title + ' on GitHub'">
                            <i class="fa fa-github" aria-hidden="true"></i> GitHub Link
                        </a>
                    </div>
                </div>
            </article>
        }
    </div>
</section>
