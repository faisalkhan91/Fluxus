<section class="about skills" aria-labelledby="top-skills-title">
    <h3 id="top-skills-title" class="title2">Top Skills</h3>
    <div class="skills-wrapper">
        @for (skill of topSkills(); track skill.name) {
            <img [ngSrc]="skill.src" [alt]="skill.name" width="62" height="62" class="icon icon-card" />
        }
    </div>
</section>

<section class="about skills" aria-labelledby="professional-skills-title">
    <h3 id="professional-skills-title" class="title2">Professional Skills</h3>
    <h4 class="title2">Programming Languages</h4>
    <div class="skills-grid">
        @for (skill of programmingLanguages(); track skill.name) {
            <div class="box">
                <h4>{{ skill.name }}</h4>
                <div class="percent" role="progressbar" [attr.aria-valuenow]="skill.percent.replace('%', '')" aria-valuemin="0" aria-valuemax="100">
                    <div [style.width]="skill.percent"></div>
                </div>
            </div>
        }
    </div>
</section>

<section class="about skills" aria-labelledby="soft-skills-title">
    <h3 id="soft-skills-title" class="title2">Soft Skills</h3>
    <h4 class="title2">Communication</h4>
    <div class="skills-grid">
        @for (skill of softSkills(); track skill.name) {
            <div class="box">
                <h4>{{ skill.name }}</h4>
                <div class="percent" role="progressbar" [attr.aria-valuenow]="skill.percent.replace('%', '')" aria-valuemin="0" aria-valuemax="100">
                    <div [style.width]="skill.percent"></div>
                </div>
            </div>
        }
    </div>
</section>
