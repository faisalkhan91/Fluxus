<section class="about hobbies" aria-labelledby="hobbies-title">
    <h3 id="hobbies-title" class="title2">Hobbies</h3>
    <ul class="hobby-list">
        @for (hobby of hobbies(); track hobby.name) {
            <li>
                <i class="fa {{ hobby.icon }}" aria-hidden="true"></i>
                <strong>{{ hobby.name }}</strong>
            </li>
        }
    </ul>
</section>
