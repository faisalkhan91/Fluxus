name: Publish image

on:
  push:
    # Tag pushes always run a release-shaped publish (full semver tag set).
    tags:
      - 'v*'
    # Pushes to main run a content-shaped publish ONLY when prerendered
    # blog content changes — the routes in src/app/app.routes.server.ts
    # are RenderMode.Prerender, so a new post needs a new image to ship.
    # `paths:` only applies to the branch trigger; tag pushes are unaffected.
    branches: [main]
    paths:
      - 'src/assets/blog/**'
  # Manual / scheduled publish handle. Two callers:
  #   1. scheduled-publish.yml dispatches us with reason=scheduled when a post
  #      in posts.json crosses its publish date overnight (the `paths:` filter
  #      above can't fire from a date boundary; only a content commit can).
  #   2. Maintainer-driven catch-up runs (e.g. after a missed schedule, or a
  #      forced re-publish following a downstream incident).
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual publish is running'
        type: choice
        options:
          - content
          - scheduled
        default: content

# Don't cancel an in-progress publish: it's already minting an image and
# opening a Homelab GitOps PR. A second push should queue, not abort.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      # Required for SARIF upload to the GitHub Security tab below.
      # `id-token: write` is intentionally omitted: provenance/sbom from
      # docker/build-push-action are derived from build context, not OIDC.
      security-events: write

    outputs:
      image: ${{ steps.image-ref.outputs.ref }}
      version: ${{ steps.image-ref.outputs.version }}
      kind: ${{ steps.ctx.outputs.kind }}
      gitops_branch: ${{ steps.ctx.outputs.gitops-branch }}
      gitops_title: ${{ steps.ctx.outputs.gitops-title }}
      has_homelab_creds: ${{ steps.gate.outputs.has_homelab_creds }}

    steps:
      - name: Resolve credential gate
        id: gate
        env:
          HOMELAB_PAT: ${{ secrets.HOMELAB_PERSONAL_ACCESS_TOKEN }}
          HOMELAB_APP_ID: ${{ vars.HOMELAB_BOT_APP_ID }}
        run: |
          # secrets are not available in downstream job-level `if:` so we
          # surface the gate decision as a build-job output instead.
          if [ -n "${HOMELAB_PAT:-}" ] || [ -n "${HOMELAB_APP_ID:-}" ]; then
            echo "has_homelab_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_homelab_creds=false" >> "$GITHUB_OUTPUT"
          fi

      # Single decision point. Three publish shapes:
      #   tag push                        -> release  (image-tag = bare semver)
      #   workflow_dispatch (scheduled)   -> scheduled (image-tag = scheduled-<yyyymmdd>)
      #   branch push / workflow_dispatch -> content   (image-tag = content-<sha>)
      # Every downstream step (metadata-action, image-ref, gitops-bump) reads
      # from these outputs so the rest of the workflow stays linear.
      - name: Compute publish context
        id: ctx
        env:
          DISPATCH_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "kind=release"                                              >> "$GITHUB_OUTPUT"
            echo "image-tag=${VERSION}"                                      >> "$GITHUB_OUTPUT"
            echo "gitops-branch=gitops/fluxus-${VERSION}"                    >> "$GITHUB_OUTPUT"
            echo "gitops-title=chore(fluxus): release v${VERSION}"           >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${DISPATCH_REASON}" = "scheduled" ]; then
            DATE="$(date -u +%Y%m%d)"
            echo "kind=scheduled"                                            >> "$GITHUB_OUTPUT"
            echo "image-tag=scheduled-${DATE}"                               >> "$GITHUB_OUTPUT"
            echo "gitops-branch=gitops/fluxus-scheduled-${DATE}"             >> "$GITHUB_OUTPUT"
            echo "gitops-title=content(fluxus): scheduled publish ${DATE}"   >> "$GITHUB_OUTPUT"
          else
            SHORT="${GITHUB_SHA:0:7}"
            echo "kind=content"                                              >> "$GITHUB_OUTPUT"
            echo "image-tag=content-${SHORT}"                                >> "$GITHUB_OUTPUT"
            echo "gitops-branch=gitops/fluxus-content-${SHORT}"              >> "$GITHUB_OUTPUT"
            echo "gitops-title=content(fluxus): blog update ${SHORT}"        >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag set is keyed off `ctx.kind` (computed above) so each publish
          # shape emits exactly the tag downstream GitOps expects:
          #   release   -> semver tags (auto-derived) + latest
          #   content   -> content-<sha> + latest
          #   scheduled -> scheduled-<yyyymmdd> + latest
          # `type=semver` only fires on tag refs natively; the other two are
          # gated on the explicit kind so workflow_dispatch on main routes to
          # the right tag (content vs scheduled) without falling back to the
          # legacy "any branch ref -> content-<sha>" rule.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=content-,format=short,enable=${{ steps.ctx.outputs.kind == 'content' }}
            type=raw,value=${{ steps.ctx.outputs.image-tag }},enable=${{ steps.ctx.outputs.kind == 'scheduled' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fluxus
          cache-to: type=gha,mode=max,scope=fluxus
          sbom: true
          provenance: mode=max

      # Build a stable image reference using the computed tag explicitly,
      # rather than `head -n1`-ing meta.outputs.tags (which could pick up
      # `latest` and confuse downstream Trivy/GitOps). For content
      # publishes `version` carries `content-<sha>`; for releases it
      # carries the bare semver. Either way, it's the value the GitOps
      # `sed` writes into the manifest.
      - name: Resolve image reference
        id: image-ref
        env:
          IMAGE_TAG: ${{ steps.ctx.outputs.image-tag }}
        run: |
          set -euo pipefail
          IMAGE_NAME_LOWER="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "ref=${REGISTRY}/${IMAGE_NAME_LOWER}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${IMAGE_TAG}"                              >> "$GITHUB_OUTPUT"

      # Single-pass Trivy: writes SARIF AND gates on HIGH/CRITICAL in one
      # invocation. `limit-severities-for-sarif: true` is what makes the
      # severity filter actually apply to the exit code (see
      # aquasecurity/trivy-action#309). Trivy writes the SARIF before exiting,
      # so `if: always()` on the upload step guarantees findings reach the
      # Security tab even when the gate trips.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image-ref.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

  gitops-bump:
    name: Open Homelab GitOps PR
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Skip cleanly on forks / first-time runs without the Homelab credentials
    # configured. Either app credentials (preferred) or a PAT works; the
    # gate is computed in build-and-push because `secrets` is not available
    # in job-level `if:` expressions.
    if: needs.build-and-push.outputs.has_homelab_creds == 'true'

    steps:
      # Prefer a GitHub App token (least-privilege, short-lived) and fall
      # back to the existing fine-scoped PAT if the App isn't set up yet.
      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.HOMELAB_BOT_APP_ID != '' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.HOMELAB_BOT_APP_ID }}
          private-key: ${{ secrets.HOMELAB_BOT_PRIVATE_KEY }}
          owner: faisalkhan91
          repositories: Homelab

      - name: Checkout Homelab monorepo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: faisalkhan91/Homelab
          token: ${{ steps.app-token.outputs.token || secrets.HOMELAB_PERSONAL_ACCESS_TOKEN }}
          path: Homelab
          # peter-evans/create-pull-request authenticates with its own
          # `token:` input rather than the in-tree git config, so we don't
          # need to persist credentials in the working tree.
          persist-credentials: false

      - name: Bump fluxus image tag
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.version }}
        run: |
          set -euo pipefail
          cd Homelab/kubernetes/apps/fluxus/base

          IMAGE_NAME_LOWER="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_PREFIX="${REGISTRY}/${IMAGE_NAME_LOWER}"
          NEW_IMAGE="${IMAGE_PREFIX}:${IMAGE_TAG}"

          # Structurally-agnostic replace: anchor the prefix so we never
          # accidentally rewrite an unrelated `image:` entry, and only touch
          # lines whose existing tag matches our registry/image.
          sed -i -E "s|image: ${IMAGE_PREFIX}:[A-Za-z0-9._-]+|image: ${NEW_IMAGE}|g" fluxus.yaml

          # Belt-and-suspenders: assert the file is still valid YAML and
          # actually contains the new image string we tried to write.
          yq e '.' fluxus.yaml > /dev/null
          grep -qF "image: ${NEW_IMAGE}" fluxus.yaml

      # Branch / title / body / labels all flow from the `ctx` outputs in
      # the upstream job, so this step doesn't care whether it's shipping a
      # release or a blog update — the surrounding text adapts.
      - name: Open GitOps PR in Homelab
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          path: Homelab
          token: ${{ steps.app-token.outputs.token || secrets.HOMELAB_PERSONAL_ACCESS_TOKEN }}
          branch: ${{ needs.build-and-push.outputs.gitops_branch }}
          base: main
          commit-message: ${{ needs.build-and-push.outputs.gitops_title }}
          title: ${{ needs.build-and-push.outputs.gitops_title }}
          body: |
            ${{ needs.build-and-push.outputs.kind == 'release'
                 && format('Automated bump from [Fluxus tag v{0}]({1}/{2}/releases/tag/v{0}).', needs.build-and-push.outputs.version, github.server_url, github.repository)
                 || format('Automated bump from [Fluxus commit {3}]({1}/{2}/commit/{0}) (blog content).', github.sha, github.server_url, github.repository, needs.build-and-push.outputs.version) }}

            - Image: `${{ needs.build-and-push.outputs.image }}`
            - Triggered by: ${{ github.actor }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Merge to let Argo / Flux roll the new image. Close the PR to abort.
          delete-branch: true
          sign-commits: true
          labels: |
            gitops
            fluxus
            ${{ needs.build-and-push.outputs.kind }}
