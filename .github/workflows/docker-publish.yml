name: Build and Push ARM64 to GHCR

on:
  push:
    branches:
      - main  # Updated to trigger on pushes/merges to main
      
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # This allows the workflow to push the image to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up the emulator to build ARM64 on an x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Name
        run: |
          echo "IMAGE_REPO=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          # Tags the image with the branch name (e.g., latest or the branch name)
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest
      
      - name: Checkout Homelab Monorepo
        uses: actions/checkout@v4
        with:
          repository: faisalkhan91/Homelab
          token: ${{ secrets.HOMELAB_PERSONAL_ACCESS_TOKEN }}
          path: Homelab

      - name: Update Kubernetes Manifest in Monorepo
        run: |
          cd Homelab/kubernetes/apps/fluxus/base
          
          # Replace the old image tag with the new Git commit hash in fluxus.yaml
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}|g" fluxus.yaml
          
          # Configure Git as a bot
          git config --global user.name "GitOps Bot"
          git config --global user.email "actions@github.com"
          
          git add fluxus.yaml
          git commit -m "chore(fluxus): update image tag to ${{ github.sha }} [skip ci]"
          git push origin main
