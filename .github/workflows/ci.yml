name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded PR runs (a force-push to a PR head branch should kill the
# old run), but never cancel main: we want every merge commit to produce a
# definitive green/red signal that downstream release-please can trust.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - run: npx ng lint
      - run: npx prettier --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - run: npx tsc --noEmit -p tsconfig.app.json

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      # Coverage thresholds + reporters are declared in angular.json under
      # the `coverage` configuration. Vitest fails the job if statements/
      # branches/functions/lines drop below the configured floors.
      - run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: warn

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      # Production deps fail on HIGH+; dev deps only fail on CRITICAL so a
      # noisy build-tool advisory doesn't block PRs while still catching
      # anything that could land in the shipped bundle.
      - name: Audit production dependencies (high+)
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (critical only)
        run: npm audit --audit-level=critical

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - run: npm run build:prod

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/fluxus/browser
          retention-days: 7

  e2e:
    name: Playwright E2E
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/fluxus/browser

      # Cache the Playwright browser binaries keyed by the resolved version
      # so we only pay the ~150MB Chromium download when @playwright/test
      # itself changes.
      - name: Get Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # The default suite skips visual.spec.ts (the snapshots are macOS-only
      # baselines and would always diff on Linux). Visual regression is
      # opt-in via VISUAL_REGRESSION=1 — see playwright.config.ts.
      - run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/fluxus/browser

      # `treosh/lighthouse-ci-action` runs against the staticDistDir defined
      # in lighthouserc.json. Budgets and category thresholds live there.
      # Reports are uploaded as a workflow artifact only — we deliberately
      # do not push to LHCI temporary public storage so unreleased blog
      # drafts in the prerendered output never leak to a public URL.
      - uses: treosh/lighthouse-ci-action@2f8dda6cf4de7d73b29853c3f29e73a01e297bd8 # v12.1.0
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true

  # Single fan-in check for branch protection. Requiring `CI / CI success`
  # instead of every individual job means adding/removing a parallel CI job
  # never requires editing branch protection rules.
  ci-success:
    name: CI success
    if: always()
    needs: [lint, typecheck, test, audit, build, e2e, lighthouse]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
