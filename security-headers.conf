# Dev / local-serve fallback. The Docker image actually uses
# `dist/fluxus/security-headers.conf` (generated by scripts/build-csp.mjs)
# because that file enumerates the SHA-256 hashes of every inline <script>
# the prerender emits — which lets script-src stay strict (no 'unsafe-inline').
#
# This source file holds a more permissive script-src so `nginx -t` and
# `ng serve` style scenarios don't fall over while iterating locally.
#
# style-src still keeps 'unsafe-inline' because Angular's prerender emits many
# short-lived <style> blocks per route — moving those off-document is a larger
# refactor (extract-css build option), tracked in the architect-audit roadmap.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-lYKVO55wk41ruL19KxQgie28dl7YEiSWtug1+AbGnm4='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
