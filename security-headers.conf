# Dev / local-serve fallback. The Docker image actually uses
# `dist/fluxus/security-headers.conf` (generated by scripts/build-csp.mjs)
# because that file enumerates the SHA-256 hashes of every inline <script>
# the prerender emits — which lets script-src stay strict (no 'unsafe-inline').
#
# This source file holds a more permissive script-src so `nginx -t` and
# `ng serve` style scenarios don't fall over while iterating locally.
#
# Notes on a few intentional CSP relaxations (mirrored in build-csp.mjs):
#
#   * 'unsafe-hashes' + 'sha256-MhtPZXr7+LpJUY5qtMutB+qWfQtMaPccfe7QXtCcEYc='
#     allows exactly the literal `this.media='all'` inline event handler that
#     Beasties (Angular's critical-CSS inliner) emits on its deferred
#     stylesheet `<link>`. Without it, the deferred stylesheet stays at
#     `media="print"` and the page renders unstyled on first paint.
#
#   * https://static.cloudflareinsights.com / https://cloudflareinsights.com
#     allow Cloudflare Web Analytics' beacon.min.js script and its report
#     endpoint. Drop both if Web Analytics is disabled in the CF dashboard.
#
# style-src still keeps 'unsafe-inline' because Angular's prerender emits many
# short-lived <style> blocks per route — moving those off-document is a larger
# refactor (extract-css build option), tracked in the architect-audit roadmap.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes' 'sha256-MhtPZXr7+LpJUY5qtMutB+qWfQtMaPccfe7QXtCcEYc=' https://static.cloudflareinsights.com 'sha256-puKWb5LlVuesXkmqJEK8DuseZjDq32KBLKuYwdDa9EI='; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
